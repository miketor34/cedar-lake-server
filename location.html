<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Cedar Lake Surf Zone Geo Fence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #f0f6ff;
            --surface:  #ffffff;
            --border:   #d0e4f7;
            --blue:     #1a6fc4;
            --blue-lt:  #e8f2fc;
            --blue-mid: #4a9de0;
            --text:     #1a2b3c;
            --muted:    #7a9bb5;
            --green:    #0d9e6e;
            --green-lt: #e6f7f2;
            --red:      #d93025;
            --red-lt:   #fdecea;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .page {
            max-width: 420px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .title {
            text-align: center;
            padding-bottom: 4px;
        }
        .title h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--blue);
            letter-spacing: -0.3px;
            line-height: 1.3;
        }
        .title p {
            font-size: 11px;
            color: var(--muted);
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border);
        }

        .zone-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 24px 20px;
            text-align: center;
            transition: all 0.4s ease;
        }
        .zone-card.good {
            border-color: var(--green);
            background: var(--green-lt);
        }
        .zone-card.bad {
            border-color: var(--red);
            background: var(--red-lt);
            animation: softpulse 1.4s ease infinite;
        }
        @keyframes softpulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(217,48,37,0.15); }
            50%      { box-shadow: 0 0 0 8px rgba(217,48,37,0); }
        }
        .zone-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .zone-status {
            font-size: 26px;
            font-weight: 600;
            color: var(--muted);
            transition: color 0.3s;
            letter-spacing: -0.5px;
        }
        .zone-card.good .zone-status { color: var(--green); }
        .zone-card.bad  .zone-status { color: var(--red); }
        .zone-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
            font-weight: 400;
        }

        .server-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .s-left { display:flex; align-items:center; gap:10px; }
        .sdot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .sdot.on  { background: var(--green); animation: pulse 2s infinite; }
        .sdot.off { background: var(--red); }
        @keyframes pulse {
            0%,100% { opacity:1; } 50% { opacity:0.4; }
        }
        .s-text { font-size: 12px; color: var(--muted); }
        .s-text strong { display:block; font-size:13px; color:var(--text); font-weight:500; margin-bottom:1px; }
        .s-btn {
            padding: 6px 13px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            background: var(--blue-lt);
            color: var(--blue);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            flex: unset;
            transition: background 0.2s;
        }
        .s-btn:hover { background: #d5e8f8; }

        .gps-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 8px 18px;
            background: var(--blue-lt);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            color: var(--blue);
            width: fit-content;
            margin: 0 auto;
            letter-spacing: 0.3px;
        }
        .gdot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.3s;
        }
        .gdot.live  { background: var(--green); animation: pulse 2s infinite; }
        .gdot.error { background: var(--red); }

        .coord-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .coord-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: border-color 0.3s;
        }
        .coord-card.flash { border-color: var(--blue-mid); }
        .c-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .c-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 500;
            color: var(--blue);
        }
        .c-val.dim { color: var(--border); }

        .info-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .info-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 10px;
            text-align: center;
        }
        .i-label {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .i-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }
        .i-val.dim { color: var(--border); }

        .btn-row { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 13px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #startBtn {
            background: var(--blue);
            color: #fff;
        }
        #startBtn:hover { background: #155da0; transform: translateY(-1px); }
        #startBtn:disabled {
            background: var(--blue-lt);
            color: var(--blue-mid);
            border: 1px solid var(--border);
            cursor: default; transform: none;
        }
        #stopBtn {
            background: var(--surface);
            color: var(--red);
            border: 1px solid var(--border);
            display: none;
        }
        #stopBtn:hover { background: var(--red-lt); }

        .log-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-box::-webkit-scrollbar { width: 3px; }
        .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .log-head {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .log-row {
            font-size: 11px;
            color: var(--muted);
            padding: 5px 0;
            border-bottom: 1px solid var(--bg);
            display: grid;
            grid-template-columns: 58px 1fr 52px;
            gap: 6px;
            align-items: center;
        }
        .log-row:last-child { border-bottom: none; }
        .l-time { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--blue-mid); }
        .l-coord { font-family:'JetBrains Mono',monospace; font-size:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .l-status { font-size:10px; text-align:right; font-weight:500; }
        .l-status.ok   { color: var(--green); }
        .l-status.warn { color: var(--red); }

        .footer {
            text-align: center;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
<div class="page">

    <div class="title">
        <h1>Big Cedar Lake Surf Zone Geo Fence</h1>
        <p>Live GPS · 406ft Shore Rule · BlueJ Connected</p>
    </div>

    <hr>

    <div class="zone-card" id="zoneCard">
        <div class="zone-label">Zone Status</div>
        <div class="zone-status" id="zoneStatus">Waiting...</div>
        <div class="zone-sub" id="zoneSub">Start tracking to check your zone</div>
    </di
